<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PRIMERA STEREO 📻 RADIO VIDEO ONLINE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="icon" type="image/ico" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="512x512">
  <style>
    body { background: linear-gradient(135deg, #0f0a1f, #1a0033); font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; margin: 0; overflow: hidden; }
    .glass { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .marquee-container { width: 100%; overflow: hidden; white-space: nowrap; position: relative; }
    .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 12s linear infinite; }
    @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
    .media-container { width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
    
    #yt-player {
      position: absolute; top: 50%; left: 50%;
      width: 135%; height: 135%;
      transform: translate(-50%, -50%) scale(1.15);
      pointer-events: none; opacity: 0;
      transition: opacity 0.8s ease; z-index: 10;
    }
    #cover-img { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 5; object-fit: cover; transition: opacity 0.5s; }
    
    .vol-container { height: 56px; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 30px; }
    .volume-slider { appearance: none; width: 50px; height: 4px; background: rgba(255, 255, 255, 0.2); border-radius: 5px; transform: rotate(-90deg); outline: none; cursor: pointer; }
    .volume-slider::-webkit-slider-thumb { appearance: none; width: 10px; height: 10px; background: #60a5fa; border-radius: 50%; }
    
    #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: rgba(15, 10, 31, 0.98); z-index: 100; transition: 0.4s; border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto; }
    #sidebar.active { left: 0; }
    .nav-item { display: flex; align-items: center; padding: 10px 15px; border-radius: 10px; margin-bottom: 5px; background: rgba(255,255,255,0.03); transition: 0.3s; }
  </style>
</head>
<body class="p-2">

  <button onclick="toggleSidebar()" class="fixed top-4 left-4 z-[110] text-white text-2xl active:scale-90">
    <i class="fas fa-bars"></i>
  </button>

  <div id="sidebar" class="p-4 pt-16">
    <h3 class="text-blue-400 font-bold tracking-widest text-xs mb-4 px-2 uppercase">Menú</h3>
    <nav class="text-white text-sm">
      <a href="https://www.instagram.com/Primera.Stereo/" target="_blank" class="nav-item"><i class="fab fa-instagram mr-3 text-pink-500"></i> Instagram</a>
      <a href="https://www.facebook.com/PrimeraStereoRadio" target="_blank" class="nav-item"><i class="fab fa-facebook mr-3 text-blue-600"></i> Facebook</a>
      <a href="https://api.whatsapp.com/send?phone=+5804127097429" target="_blank" class="nav-item"><i class="fab fa-whatsapp mr-3 text-green-500"></i> Whatsapp</a>
      <a href="https://www.youtube.com/@primerastereo" target="_blank" class="nav-item"><i class="fab fa-youtube mr-3 text-red-600"></i> Youtube</a>
    </nav>
  </div>

  <div class="flex-1 flex flex-col max-w-lg w-full mx-auto justify-between pt-2">
    <div class="flex items-center justify-center gap-2 mb-2">
      <img src="https://primerastereo.netlify.app/favicon.png" class="w-8 h-10 object-contain">
      <div class="text-center">
        <h1 class="text-xl font-bold text-white uppercase">PRIMERA STEREO</h1>
        <p class="text-orange-400 text-[10px] -mt-1 uppercase tracking-widest">Radio Video Online</p>
      </div>
    </div>

    <div class="glass rounded-2xl p-4 shadow-2xl flex-1 flex flex-col justify-around mb-2">
      <div class="media-container" id="media-container">
        <img id="cover-img" src="https://primera-stereo.netlify.app/PSRO5-5.png" style="object-fit: contain; padding: 20px;">
      </div>

      <div class="text-center mt-2">
        <p class="uppercase tracking-widest text-orange-400 text-[12px] font-bold mb-1">● EN VIVO</p>
        <div class="marquee-container">
          <h2 id="song-title" class="text-lg font-bold text-white">Iniciando...</h2>
        </div>
        <p id="artist" class="text-orange-400 text-xs font-bold">Primera Stereo</p>
      </div>

      <div class="flex items-center justify-center gap-6 mt-2">
        <div class="w-10"></div> 
        <button onclick="togglePlay()" id="play-btn" class="w-14 h-14 bg-gradient-to-br from-blue-600 to-violet-600 rounded-full flex items-center justify-center text-2xl shadow-xl text-white z-10">
          <i class="fas fa-play" id="play-icon"></i>
        </button>
        <div class="vol-container">
          <input type="range" min="0" max="1" step="0.01" value="0.8" class="volume-slider" oninput="setVolume(this.value)">
        </div>
      </div>
    </div>

    <div class="text-center mb-1">
      <a id="ad-link" href="#" target="_blank" class="block glass rounded-lg p-1 overflow-hidden">
        <img id="ad-banner" src="https://primerastereo.netlify.app/disponible2.jpg" style="height:50px; width:100%; object-fit:contain;">
      </a>
    </div>

    <footer class="text-center text-orange-400 text-[9px] py-1 font-bold">
      © 2010 - 2026 PRIMERA STEREO
    </footer>
  </div>

  <audio id="audio-player" crossorigin="anonymous"></audio>

  <script>
    const audio = document.getElementById('audio-player');
    const mediaContainer = document.getElementById('media-container');
    const songTitle = document.getElementById('song-title');
    const artistEl = document.getElementById('artist');
    const playIcon = document.getElementById('play-icon');
    
    let isPlaying = true;
    let lastTitle = "";
    let checkVideoTimeout = null;
    const streamUrl = "https://primerastereo.stream.laut.fm/primerastereo";

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function setVolume(val) { audio.volume = val; }

    function showLogo() {
      if(checkVideoTimeout) clearTimeout(checkVideoTimeout);
      const player = document.getElementById('yt-player');
      if(player) player.remove();
      mediaContainer.innerHTML = `<img id="cover-img" src="https://primera-stereo.netlify.app/PSRO5-5.png" style="width:100%; height:100%; object-fit:contain; padding: 20px;">`;
    }

    async function showCover(artist, title) {
      try {
        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artist + ' ' + title)}&entity=song&limit=1`);
        const data = await res.json();
        if (data.results?.length > 0) {
          const coverUrl = data.results[0].artworkUrl100.replace('100x100', '800x800');
          mediaContainer.innerHTML = `<img id="cover-img" src="${coverUrl}" style="width:100%; height:100%; object-fit:cover;">`;
        } else { showLogo(); }
      } catch (e) { showLogo(); }
    }

    window.onmessage = function(e) {
      if (e.data && typeof e.data === 'string' && e.data.includes('onStateChange')) {
        const info = JSON.parse(e.data);
        const ytPlayer = document.getElementById('yt-player');
        const cover = document.getElementById('cover-img');
        if (info.info === 1 && ytPlayer) {
          clearTimeout(checkVideoTimeout);
          ytPlayer.style.opacity = 1;
          if(cover) cover.style.opacity = 0;
        }
      }
    };

    async function updateMetadata() {
      try {
        const res = await fetch('https://api.laut.fm/station/primerastereo/current_song');
        const data = await res.json();
        const title = data.title || "En Vivo";
        const artist = data.artist?.name || "Primera Stereo";

        if (title === lastTitle) return;
        lastTitle = title;
        if(checkVideoTimeout) clearTimeout(checkVideoTimeout);

        const oldPlayer = document.getElementById('yt-player');
        if(oldPlayer) oldPlayer.remove();

        songTitle.classList.remove('marquee-text');
        void songTitle.offsetWidth; 
        songTitle.textContent = title;
        if(title.length > 20) songTitle.classList.add('marquee-text');
        artistEl.textContent = artist;

        // Lógica de visualización
        if (artist.toUpperCase().includes("PRIMERA STEREO") || title.toUpperCase().includes("JINGLE")) {
          showLogo();
        } else {
          // Primero intentamos poner la carátula de Apple Music como base
          await showCover(artist, title);

          // Luego buscamos el video oficial
          const query = encodeURIComponent(artist + " " + title + " official music video");
          fetch(`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent('https://www.youtube.com/results?search_query=' + query)}`)
          .then(r => r.text())
          .then(html => {
            const match = html.match(/"videoId":"([^"]+)"/);
            if (match && match[1]) {
              const iframe = document.createElement('iframe');
              iframe.id = "yt-player";
              iframe.src = `https://www.youtube.com/embed/${match[1]}?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&enablejsapi=1&origin=${window.location.origin}`;
              iframe.frameBorder = "0";
              iframe.allow = "autoplay";
              mediaContainer.appendChild(iframe);

              // Si falla el video (UMPG), se quedará la carátula de Apple que cargamos antes
              checkVideoTimeout = setTimeout(() => {
                const player = document.getElementById('yt-player');
                if (player && player.style.opacity === "0") player.remove();
              }, 6000);
            }
          }).catch(() => {});
        }
      } catch (e) { showLogo(); }
    }

    function togglePlay() {
      if (audio.paused) {
        if (!audio.src) audio.src = streamUrl;
        audio.play().then(() => {
          isPlaying = true;
          playIcon.classList.replace('fa-play', 'fa-pause');
          updateMetadata();
        });
      } else {
        audio.pause();
        isPlaying = false;
        playIcon.classList.replace('fa-pause', 'fa-play');
      }
    }

    window.onload = () => { updateMetadata(); setTimeout(togglePlay, 1500); };
    setInterval(() => { if (isPlaying) updateMetadata(); }, 15000);
  </script>
</body>
</html>
