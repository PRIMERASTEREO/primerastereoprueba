<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Primera Stereo - Radio Video Online</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f0a1f, #1a0033);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px 0;
    }
    .glass {
      background: rgba(255, 255, 255, 0.09);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    .media-container {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
    }
  </style>
</head>
<body>

  <div class="max-w-lg w-full mx-auto">

    <!-- Header con Logo -->
    <div class="flex items-center justify-center gap-4 mb-8">
      <div id="logo-container" class="w-20 h-20 bg-gradient-to-br from-blue-500 to-purple-600 rounded-3xl flex items-center justify-center text-5xl shadow-xl overflow-hidden">
        <img id="radio-logo" src="https://primerastereo.netlify.app/favicon.png" 
             alt="Logo Primera Stereo" class="w-full h-full object-contain">
      </div>
      <div>
        <h1 class="text-5xl font-bold tracking-tighter text-center text-white">PRIMERA STEREO</h1>
        <p class="text-blue-400 text-xl text-center -mt-1">RADIO VIDEO ONLINE</p>
      </div>
    </div>

    <!-- Reproductor -->
    <div class="glass rounded-3xl p-8 shadow-2xl">

      <!-- Área de Media (Video o Carátula) -->
      <div class="mb-6">
        <div id="media-container" class="media-container">
          <!-- Se llenará dinámicamente con video o carátula -->
        </div>
      </div>

      <!-- Información de la canción -->
      <div class="text-center mb-6">
        <p class="uppercase tracking-widest text-green-500 text-sm font-medium">● EN VIVO</p>
        <h2 id="song-title" class="text-2xl text-white">Cargando canción...</h2>
        <p id="artist" class="text-green-500 text-lg">Primera Stereo</p>
      </div>

      <!-- Botón Play/Pause -->
      <div class="flex justify-center mb-6">
        <button onclick="togglePlay()" 
                id="play-btn"
                class="w-28 h-28 bg-gradient-to-br from-blue-600 via-purple-600 to-violet-600 hover:brightness-110 transition-all rounded-full flex items-center justify-center text-6xl shadow-2xl shadow-purple-500/70 active:scale-95">
          <i class="fas fa-play" id="play-icon"></i>
        </button>
      </div>

      <audio id="audio-player" class="hidden" crossorigin="anonymous"></audio>
    </div>

    <!-- Redes Sociales -->
    <div class="flex justify-center gap-8 mt-10 text-4xl text-gray-100">
      <a href="https://www.facebook.com/PrimeraStereoRadio" target="_blank" class="hover:text-blue-600 transition"><i class="fab fa-facebook"></i></a>
      <a href="https://www.instagram.com/Primera.Stereo/" target="_blank" class="hover:text-pink-600 transition"><i class="fab fa-instagram"></i></a>
      <a href="https://x.com/Primera_Stereo" target="_blank" class="hover:text-sky-600 transition"><i class="fab fa-x-twitter"></i></a>
      <a href="https://www.youtube.com/@primerastereo" target="_blank" class="hover:text-red-600 transition"><i class="fab fa-youtube"></i></a>
      <a href="https://api.whatsapp.com/send?phone=+5804127097429&text=Hola%20estoy%20escuchando%20la%20radio%20y%20quiero%20informaci%C3%B3n%20%20de%20la%20publicidad" target="_blank" class="hover:text-green-500 transition"><i class="fab fa-whatsapp"></i></a>
    </div>

    <footer class="text-center text-gray-100 text-xs mt-10">
      © 2010 - 2026 Primera Stereo • Radio Video Online
    </footer>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const audio = document.getElementById('audio-player');
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const mediaContainer = document.getElementById('media-container');

    let isPlaying = false;
    let player = null;
    let lastSongTitle = "";

    audio.src = "https://primerastereo.stream.laut.fm/primerastereo";
    const metadataUrl = "https://api.laut.fm/station/primerastereo/current_song";

    // Inicializar YouTube Player
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-player', {
        height: '100%',
        width: '100%',
        playerVars: { 
          'autoplay': 0, 
          'mute': 1, 
          'controls': 0, 
          'modestbranding': 1, 
          'rel': 0 
        }
      });
    }

    function showCover(coverUrl) {
      mediaContainer.innerHTML = `
        <img src="${coverUrl || 'https://primerastereo.netlify.app/favicon.png'}" 
             alt="Portada" style="width:100%; height:100%; object-fit:contain; background:#1a0033;">
      `;
    }

    async function updateMetadata() {
      try {
        const res = await fetch(metadataUrl);
        const data = await res.json();

        const title = data.title || "En Vivo";
        const artist = data.artist?.name || "Primera Stereo";

        document.getElementById('song-title').textContent = title;
        document.getElementById('artist').textContent = artist;

        // Solo actualizar si cambió la canción
        if (title === lastSongTitle) return;
        lastSongTitle = title;

        // Reset video
        if (player && player.stopVideo) player.stopVideo();

        // Si es jingle de la radio → mostrar logo
        if (artist.toUpperCase().includes("PRIMERA STEREO") || title.toUpperCase().includes("JINGLE")) {
          showCover("https://primerastereo.netlify.app/favicon.png");
          return;
        }

        // Buscar portada con iTunes
        let coverUrl = "https://primerastereo.netlify.app/favicon.png";
        try {
          const itunesRes = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artist + " " + title)}&entity=song&limit=1`);
          const itunesData = await itunesRes.json();
          if (itunesData.results && itunesData.results.length > 0) {
            coverUrl = itunesData.results[0].artworkUrl100.replace('100x100', '600x600');
          }
        } catch (e) {}

        // Intentar cargar video (método más estable posible sin API Key funcional)
        const query = encodeURIComponent(artist + " " + title + " official video");
        fetch(`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent('https://www.youtube.com/results?search_query=' + query)}`)
        .then(r => r.text())
        .then(html => {
          const idMatch = html.match(/"videoId":"([^"]+)"/);
          if (idMatch && idMatch[1] && player && player.loadVideoById) {
            player.loadVideoById({ videoId: idMatch[1], startSeconds: 0 });
            setTimeout(() => {
              mediaContainer.innerHTML = `
                <iframe width="100%" height="100%" 
                        src="https://www.youtube.com/embed/${idMatch[1]}?autoplay=1&mute=1&modestbranding=1&rel=0" 
                        frameborder="0" allowfullscreen></iframe>
              `;
            }, 1500); // Esperamos un poco para que cargue el player
          } else {
            showCover(coverUrl);
          }
        })
        .catch(() => {
          showCover(coverUrl);
        });

      } catch (e) {
        console.error(e);
        showCover("https://primerastereo.netlify.app/favicon.png");
      }
    }

    async function togglePlay() {
      if (!isPlaying) {
        try {
          await audio.play();
          isPlaying = true;
          playIcon.classList.replace('fa-play', 'fa-pause');
          updateMetadata();
        } catch (err) {
          console.error(err);
          alert("No se pudo reproducir el audio.");
        }
      } else {
        audio.pause();
        isPlaying = false;
        playIcon.classList.replace('fa-pause', 'fa-play');
      }
    }

    // Actualizar metadatos cada 10 segundos solo si está reproduciendo
    setInterval(() => {
      if (isPlaying) updateMetadata();
    }, 10000);

    window.onload = () => {
      updateMetadata();
    };
  </script>
</body>
</html>
