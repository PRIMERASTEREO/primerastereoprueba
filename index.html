<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Primera Stereo - Radio Video Online</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f0a1f, #1a0033);
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      margin: 0;
      overflow: hidden;
    }
    .glass {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .media-container {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    #ad-banner { transition: opacity 0.8s ease-in-out; height: 60px; object-fit: contain; width: 100%; }
    iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  </style>
</head>
<body class="p-4">

  <div class="flex-1 flex flex-col max-w-lg w-full mx-auto justify-between">
    
    <div class="flex items-center justify-center gap-3 mb-4">
      <img src="https://primerastereo.netlify.app/favicon.png" alt="Logo" class="w-12 h-12 object-contain rounded-xl shadow-lg">
      <div>
        <h1 class="text-2xl font-bold tracking-tighter text-white">PRIMERA STEREO</h1>
        <p class="text-blue-400 text-xs text-center -mt-1 uppercase tracking-widest">Radio Video Online</p>
      </div>
    </div>

    <div class="glass rounded-3xl p-5 shadow-2xl flex-1 flex flex-col justify-around mb-4">
      <div class="media-container" id="media-container">
        <img src="https://primerastereo.netlify.app/favicon.png" id="main-logo" style="width:100%; height:100%; object-fit:contain; padding: 20px;">
      </div>

      <div class="text-center mt-4">
        <p class="uppercase tracking-widest text-emerald-400 text-[10px] font-bold mb-1">● EN VIVO</p>
        <h2 id="song-title" class="text-xl font-bold text-white truncate px-2">Primera Stereo</h2>
        <p id="artist" class="text-gray-300 text-sm">Cargando señal...</p>
      </div>

      <div class="flex justify-center mt-4">
        <button onclick="togglePlay()" id="play-btn"
          class="w-20 h-20 bg-gradient-to-br from-blue-600 to-violet-600 rounded-full flex items-center justify-center text-4xl shadow-2xl active:scale-90 transition-transform text-white">
          <i class="fas fa-play" id="play-icon"></i>
        </button>
      </div>
    </div>

    <div class="text-center mb-2">
      <p class="text-[9px] text-blue-400 font-bold tracking-widest mb-1">NUESTROS PATROCINANTES</p>
      <a id="ad-link" href="#" target="_blank" class="block glass rounded-xl p-1 overflow-hidden">
        <img id="ad-banner" src="https://primerastereo.netlify.app/disponible2.jpg">
      </a>
    </div>

    <footer class="text-center text-gray-500 text-[10px] py-2">
      © 2010 - 2026 PRIMERA STEREO 📻 RADIO VIDEO ONLINE
    </footer>
  </div>

  <audio id="audio-player" crossorigin="anonymous"></audio>

  <script>
    const audio = document.getElementById('audio-player');
    const mediaContainer = document.getElementById('media-container');
    const songTitle = document.getElementById('song-title');
    const artistEl = document.getElementById('artist');
    const playIcon = document.getElementById('play-icon');
    
    let isPlaying = false;
    let lastTitle = "";
    const streamUrl = "https://primerastereo.stream.laut.fm/primerastereo";

    const banners = [
      { img: "https://primerastereo.netlify.app/disponible2.jpg", link: "https://api.whatsapp.com/send?phone=+5804127097429" },
      { img: "https://primerastereo.netlify.app/Alvacom%20Systems.jpg", link: "https://www.facebook.com/AlvacomSystems" },
      { img: "https://primerastereo.netlify.app/KINESIOLOGIA2.gif", link: "https://www.instagram.com/nely_alvarez" },
      { img: "https://primerastereo.netlify.app/En3D%20Venezuela%20Banner.png", link: "http://www.en3d.io" },
      { img: "https://primerastereo.netlify.app/disponible1.jpg", link: "https://api.whatsapp.com/send?phone=+5804127097429" }
    ];
    let bIdx = 0;

    function rotateBanners() {
      const bImg = document.getElementById('ad-banner');
      bImg.style.opacity = 0;
      setTimeout(() => {
        bImg.src = banners[bIdx].img;
        document.getElementById('ad-link').href = banners[bIdx].link;
        bImg.style.opacity = 1;
        bIdx = (bIdx + 1) % banners.length;
      }, 800);
    }

    function showLogo() {
      mediaContainer.innerHTML = `<img src="https://primerastereo.netlify.app/favicon.png" style="width:100%; height:100%; object-fit:contain; padding: 20px;">`;
    }

    async function updateMetadata() {
      try {
        const res = await fetch('https://api.laut.fm/station/primerastereo/current_song');
        const data = await res.json();
        const title = data.title || "En Vivo";
        const artist = data.artist?.name || "Primera Stereo";

        if (title === lastTitle) return;
        lastTitle = title;

        songTitle.textContent = title;
        artistEl.textContent = artist;

        const isJingle = artist.toUpperCase().includes("PRIMERA STEREO") || 
                         title.toUpperCase().includes("JINGLE") || 
                         artist.toUpperCase().includes("RADIO");

        if (isJingle) {
          showLogo();
        } else {
          const query = encodeURIComponent(artist + " " + title + " official video");
          const ytUrl = `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent('https://www.youtube.com/results?search_query=' + query)}`;
          
          fetch(ytUrl)
          .then(r => r.text())
          .then(html => {
            const match = html.match(/"videoId":"([^"]+)"/);
            if (match && match[1]) {
              mediaContainer.innerHTML = `<iframe src="https://www.youtube.com/embed/${match[1]}?autoplay=1&mute=1&controls=0&modestbranding=1&showinfo=0&rel=0" frameborder="0" allow="autoplay; encrypted-media"></iframe>`;
            } else { showLogo(); }
          }).catch(() => showLogo());
        }
      } catch (e) { showLogo(); }
    }

    function togglePlay() {
      if (audio.paused) {
        if (!audio.src) audio.src = streamUrl;
        audio.play().then(() => {
          isPlaying = true;
          playIcon.classList.replace('fa-play', 'fa-pause');
          updateMetadata();
        }).catch(err => console.error("Error de reproducción:", err));
      } else {
        audio.pause();
        isPlaying = false;
        playIcon.classList.replace('fa-pause', 'fa-play');
      }
    }

    setInterval(() => { if (isPlaying) updateMetadata(); }, 15000);
    setInterval(rotateBanners, 15000);
    window.onload = () => { rotateBanners(); updateMetadata(); };
  </script>
</body>
</html>
