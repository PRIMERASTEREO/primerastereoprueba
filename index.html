<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIMERA STEREO 📻 RADIO VIDEO ONLINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="icon" href="https://primerastereo.netlify.app/favicon.png">
    <style>
        :root { --primary-color: #1877F2; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #000; 
            color: white; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        
        .bg-layer { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background-size: cover; background-position: center; 
            filter: blur(60px) brightness(0.2); z-index: -2; transition: 2s; 
        }
        .bg-overlay { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.9)); z-index: -1; 
        }

        main { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 10; text-align: center; 
        }

        .logo-container { 
            width: 325px; height: 315px; border-radius: 20px; overflow: hidden; 
            position: relative; box-shadow: 0 0 60px rgba(0,0,0,0.9); background: #000; 
            margin-bottom: 20px; 
        }

        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #yt-player { width: 100%; height: 100%; border: none; }
        #album-art { 
            width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 2; 
            transition: opacity 1.5s; 
        }

        .track-info { 
            width: 340px; margin: 0 auto 15px; overflow: hidden; white-space: nowrap; 
        }
        .marquee { 
            display: inline-block; animation: marquee 18s linear infinite; 
        }
        @keyframes marquee { 
            0% { transform: translateX(100%); } 
            100% { transform: translateX(-100%); } 
        }

        .play-btn { 
            width: 68px; height: 68px; border-radius: 50%; background: var(--primary-color); 
            border: none; color: white; font-size: 1.6rem; cursor: pointer; 
        }
    </style>
</head>
<body>
    <div class="bg-layer" id="bg-layer"></div>
    <div class="bg-overlay"></div>

    <main>
        <h1 style="color:var(--primary-color); font-size:1.95rem; letter-spacing:3px;">PRIMERA STEREO</h1>
        <p style="letter-spacing:6px; opacity:0.9; margin-bottom:20px;">RADIO VIDEO ONLINE</p>

        <div class="logo-container">
            <div id="video-container"><div id="yt-player"></div></div>
            <img src="https://primerastereo.netlify.app/favicon.png" id="album-art" alt="Portada">
        </div>

        <div class="track-info">
            <div class="marquee">
                <span id="artist-name">PRIMERA STEREO</span>
                <span id="song-title" style="color:var(--primary-color); margin-left:15px;">Cargando...</span>
            </div>
        </div>

        <button id="play-btn" class="play-btn"><i class="fas fa-play"></i></button>
        
        <div style="margin-top:15px;">
            <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.8" style="width:240px;">
        </div>
    </main>

    <audio id="audio-player" src="https://primerastereo.stream.laut.fm/primerastereo" crossorigin="anonymous"></audio>

    <script>
        const art = document.getElementById('album-art');
        const bg = document.getElementById('bg-layer');
        const audio = document.getElementById('audio-player');
        let player = null;

        // Cargar YouTube API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '100%',
                width: '100%',
                playerVars: { 
                    'autoplay': 1, 
                    'mute': 1, 
                    'controls': 0, 
                    'modestbranding': 1, 
                    'rel': 0 
                }
            });
        }

        async function update() {
            try {
                const res = await fetch('https://api.laut.fm/station/primerastereo/current_song');
                const data = await res.json();

                const artist = data.artist.name;
                const title = data.title;

                document.getElementById('artist-name').innerText = artist;
                document.getElementById('song-title').innerText = title;

                // Reset
                if (player && player.stopVideo) player.stopVideo();
                document.getElementById('yt-player').style.opacity = "0";
                art.style.opacity = "1";

                // Si es jingle de la emisora
                if (artist.toUpperCase().includes("PRIMERA STEREO") || title.toUpperCase().includes("JINGLE")) {
                    art.src = "https://primerastereo.netlify.app/favicon.png";
                    bg.style.backgroundImage = "none";
                } else {
                    // Portada con iTunes
                    const itunes = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artist + " " + title)}&entity=song&limit=1`);
                    const iData = await itunes.json();
                    let img = (iData.results && iData.results.length > 0) 
                        ? iData.results[0].artworkUrl100.replace('100x100', '600x600') 
                        : 'https://primerastereo.netlify.app/favicon.png';
                    
                    art.src = img;
                    bg.style.backgroundImage = `url('${img}')`;

                    // Buscar video con proxy (tu método que sí funciona)
                    const query = encodeURIComponent(artist + " " + title + " official video");
                    fetch(`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent('https://www.youtube.com/results?search_query=' + query)}`)
                    .then(r => r.text())
                    .then(html => {
                        const idMatch = html.match(/"videoId":"([^"]+)"/);
                        if (idMatch && idMatch[1] && player && player.loadVideoById) {
                            player.loadVideoById({ 
                                videoId: idMatch[1], 
                                startSeconds: 0 
                            });
                            setTimeout(() => {
                                document.getElementById('yt-player').style.opacity = "1";
                                art.style.opacity = "0";
                            }, 3500);
                        }
                    });
                }
            } catch (e) {
                console.error(e);
            }
        }

        // Controles
        document.getElementById('play-btn').addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                audio.pause();
                document.getElementById('play-btn').innerHTML = '<i class="fas fa-play"></i>';
            }
        });

        document.getElementById('volume-slider').addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        // Actualizar cada 12 segundos
        setInterval(update, 12000);
        update();
    </script>
</body>
</html>
