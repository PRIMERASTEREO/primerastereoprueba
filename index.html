<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primera Stereo - Radio Video Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="icon" href="https://primerastereo.netlify.app/favicon.png">
    <style>
        body {
            background: linear-gradient(135deg, #0f0a1f, #1a0033);
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
        }
        .media-box {
            width: 320px;
            height: 320px;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

  <div class="max-w-md w-full mx-auto p-6">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-3">
        <img src="https://primerastereo.netlify.app/favicon.png" alt="Logo" class="w-16 h-16 object-contain">
      </div>
      <h1 class="text-4xl font-bold tracking-tight text-white">PRIMERA STEREO</h1>
      <p class="text-blue-400 text-lg">RADIO VIDEO ONLINE</p>
    </div>

    <!-- Media Box -->
    <div class="glass p-6">
      <div class="media-box mx-auto" id="media-container">
        <img id="album-art" src="https://primerastereo.netlify.app/favicon.png" alt="Portada" class="w-full h-full object-cover">
      </div>

      <!-- Info -->
      <div class="text-center mt-6 mb-8">
        <p class="text-emerald-400 text-sm font-medium tracking-widest">● EN VIVO</p>
        <h2 id="song-title" class="text-2xl font-semibold text-white mt-2">Cargando canción...</h2>
        <p id="artist" class="text-gray-300 text-lg mt-1">Primera Stereo</p>
      </div>

      <!-- Play Button + Volume -->
      <div class="flex flex-col items-center gap-6">
        <button id="play-btn" 
                class="w-20 h-20 bg-gradient-to-br from-blue-600 to-violet-600 rounded-full flex items-center justify-center text-5xl shadow-xl active:scale-95 transition">
          <i class="fas fa-play" id="play-icon"></i>
        </button>

        <div class="flex items-center gap-4 w-56">
          <i class="fas fa-volume-up text-gray-400"></i>
          <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8" class="w-full accent-blue-500">
        </div>
      </div>
    </div>

    <audio id="audio-player" src="https://primerastereo.stream.laut.fm/primerastereo" crossorigin="anonymous"></audio>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const API_KEY = "AIzaSyCqoBZiuGPXibmPuhpLbGZlBIcntSj2lDc";
    const audio = document.getElementById('audio-player');
    const mediaContainer = document.getElementById('media-container');
    const songTitle = document.getElementById('song-title');
    const artistEl = document.getElementById('artist');
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const volumeSlider = document.getElementById('volume-slider');

    let isPlaying = false;
    let ytPlayer = null;

    volumeSlider.addEventListener('input', () => {
      audio.volume = parseFloat(volumeSlider.value);
    });

    function onYouTubeIframeAPIReady() {
      ytPlayer = new YT.Player('yt-player', {
        height: '100%',
        width: '100%',
        playerVars: { 'autoplay': 0, 'mute': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0 }
      });
    }

    function showCover(coverUrl) {
      mediaContainer.innerHTML = `
        <img src="${coverUrl}" class="w-full h-full object-cover" alt="Portada">
      `;
    }

    async function loadYouTubeVideo(title, artist) {
      try {
        const query = encodeURIComponent(`${artist} ${title} official video`);
        const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&type=video&maxResults=1&key=${API_KEY}`);
        const data = await res.json();

        if (data.items && data.items.length > 0) {
          const videoId = data.items[0].id.videoId;
          mediaContainer.innerHTML = `
            <iframe width="100%" height="100%" 
                    src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&modestbranding=1&rel=0" 
                    frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen>
            </iframe>
          `;
          return true;
        }
      } catch (e) {
        console.log("No se pudo cargar video de YouTube");
      }
      return false;
    }

    async function updateMetadata() {
      try {
        const res = await fetch('https://api.laut.fm/station/primerastereo/current_song');
        const data = await res.json();

        const title = data.title || "En Vivo";
        const artist = data.artist?.name || "Primera Stereo";

        songTitle.textContent = title;
        artistEl.textContent = artist;

        // Primero intentamos cargar video
        const videoLoaded = await loadYouTubeVideo(title, artist);

        // Si no hay video, mostramos portada
        if (!videoLoaded) {
          const itunesRes = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artist + " " + title)}&entity=song&limit=1`);
          const itunesData = await itunesRes.json();
          let cover = "https://primerastereo.netlify.app/favicon.png";
          if (itunesData.results && itunesData.results.length > 0) {
            cover = itunesData.results[0].artworkUrl100.replace('100x100', '600x600');
          }
          showCover(cover);
        }

      } catch (e) {
        console.error(e);
        showCover("https://primerastereo.netlify.app/favicon.png");
      }
    }

    playBtn.addEventListener('click', async () => {
      if (!isPlaying) {
        await audio.play();
        isPlaying = true;
        playIcon.classList.replace('fa-play', 'fa-pause');
        updateMetadata();
      } else {
        audio.pause();
        isPlaying = false;
        playIcon.classList.replace('fa-pause', 'fa-play');
      }
    });

    // Actualizar cada 8 segundos
    setInterval(() => {
      if (isPlaying) updateMetadata();
    }, 8000);

    window.onload = () => {
      audio.volume = 0.8;
      updateMetadata();
    };
  </script>
</body>
</html>
