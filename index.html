<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIMERA STEREO 📻 RADIO VIDEO ONLINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="icon" href="https://primerastereo.netlify.app/favicon.png">
    <style>
        :root { --primary: #1877F2; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #000;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .bg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(60px) brightness(0.25);
            z-index: -2;
            transition: 2s;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10;
        }

        .logo-container {
            width: 325px;
            height: 315px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 60px rgba(0,0,0,0.95);
            background: #000;
            margin-bottom: 20px;
        }

        .media-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #yt-player, #album-art {
            width: 100%;
            height: 100%;
            transition: opacity 1s ease;
        }

        .track-info {
            width: 340px;
            margin: 0 auto 15px;
            overflow: hidden;
            white-space: nowrap;
        }

        .marquee {
            display: inline-block;
            animation: marquee 18s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .play-btn {
            width: 70px; height: 70px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="bg-layer" id="bg-layer"></div>

    <main>
        <h1 style="color:var(--primary); font-size:1.95rem; letter-spacing:3px;">PRIMERA STEREO</h1>
        <p style="letter-spacing:6px; font-size:0.85rem; opacity:0.9; margin-bottom:15px;">RADIO VIDEO ONLINE</p>

        <div class="logo-container">
            <div class="media-container" id="media-container">
                <img id="album-art" src="https://primerastereo.netlify.app/favicon.png" alt="Portada">
            </div>
        </div>

        <div class="track-info">
            <div class="marquee">
                <span id="artist-name" style="font-size:1.35rem; font-weight:600;">PRIMERA STEREO</span>
                <span id="song-title" style="color:var(--primary); font-size:1.35rem; margin-left:15px;">Cargando...</span>
            </div>
        </div>

        <button id="play-btn" class="play-btn"><i class="fas fa-play"></i></button>
        
        <div style="margin-top:15px;">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8" style="width:240px; accent-color: var(--primary);">
        </div>
    </main>

    <audio id="audio-player" src="https://primerastereo.stream.laut.fm/primerastereo" crossorigin="anonymous"></audio>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const API_KEY = "AIzaSyCqoBZiuGPXibmPuhpLbGZlBIcntSj2lDc";
        const audio = document.getElementById('audio-player');
        const albumArt = document.getElementById('album-art');
        const bgLayer = document.getElementById('bg-layer');
        const songTitleEl = document.getElementById('song-title');
        const artistNameEl = document.getElementById('artist-name');
        const playBtn = document.getElementById('play-btn');
        const mediaContainer = document.getElementById('media-container');
        const volumeSlider = document.getElementById('volume-slider');

        let isPlaying = false;
        let ytPlayer = null;

        volumeSlider.addEventListener('input', () => audio.volume = parseFloat(volumeSlider.value));

        // YouTube API Ready
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 0,
                    'mute': 1,
                    'controls': 0,
                    'modestbranding': 1,
                    'rel': 0
                }
            });
        }

        function showAlbumArt(coverUrl) {
            mediaContainer.innerHTML = `<img id="album-art" src="${coverUrl}" alt="Portada" style="width:100%; height:100%; object-fit:cover;">`;
        }

        async function updateMetadata() {
            try {
                const res = await fetch('https://api.laut.fm/station/primerastereo/current_song');
                const data = await res.json();

                const title = data.title || "En Vivo";
                const artist = data.artist?.name || "Primera Stereo";

                artistNameEl.textContent = artist;
                songTitleEl.textContent = title;

                // Portada con iTunes
                const query = encodeURIComponent(artist + " " + title);
                const itunes = await fetch(`https://itunes.apple.com/search?term=${query}&entity=song&limit=1`);
                const iData = await itunes.json();

                let coverUrl = "https://primerastereo.netlify.app/favicon.png";
                if (iData.results && iData.results.length > 0) {
                    coverUrl = iData.results[0].artworkUrl100.replace('100x100', '600x600');
                }

                // Intentar cargar video de YouTube
                const videoQuery = encodeURIComponent(artist + " " + title + " official video");
                const ytRes = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${videoQuery}&type=video&maxResults=1&key=${API_KEY}`);
                const ytData = await ytRes.json();

                if (ytData.items && ytData.items.length > 0) {
                    const videoId = ytData.items[0].id.videoId;
                    mediaContainer.innerHTML = `
                        <iframe width="100%" height="100%" 
                                src="https://www.youtube.com/embed/${videoId}?autoplay=0&mute=1&modestbranding=1&rel=0" 
                                frameborder="0" allowfullscreen></iframe>
                    `;
                } else {
                    showAlbumArt(coverUrl);
                }

                bgLayer.style.backgroundImage = `url('${coverUrl}')`;

            } catch (e) {
                console.error(e);
                showAlbumArt("https://primerastereo.netlify.app/favicon.png");
            }
        }

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                isPlaying = true;
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                isPlaying = false;
            }
        });

        setInterval(() => {
            if (isPlaying) updateMetadata();
        }, 8000);

        window.onload = () => {
            audio.volume = 0.8;
            updateMetadata();
        };
    </script>
</body>
</html>
