<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Primera Stereo - Radio Video Online</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f0a1f, #1a0033);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px 0;
    }
    .glass {
      background: rgba(255, 255, 255, 0.09);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    .media-container {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
    }
  </style>
</head>
<body>

  <div class="max-w-lg w-full mx-auto">

    <!-- Header -->
    <div class="flex items-center justify-center gap-4 mb-8">
      <img src="https://primerastereo.netlify.app/favicon.png" 
           alt="Logo" class="w-20 h-20 object-contain rounded-3xl shadow-xl">
      <div>
        <h1 class="text-5xl font-bold tracking-tighter text-white">PRIMERA STEREO</h1>
        <p class="text-blue-400 text-xl text-center -mt-1">RADIO VIDEO ONLINE</p>
      </div>
    </div>

    <!-- Media Container -->
    <div class="glass rounded-3xl p-8 shadow-2xl">
      <div class="media-container" id="media-container">
        <img id="album-art" src="https://primerastereo.netlify.app/favicon.png" alt="Portada" style="width:100%; height:100%; object-fit:contain;">
      </div>

      <!-- Info -->
      <div class="text-center mt-6 mb-8">
        <p class="uppercase tracking-widest text-emerald-400 text-sm font-medium">● EN VIVO</p>
        <h2 id="song-title" class="text-2xl font-bold text-white mt-2">Cargando canción...</h2>
        <p id="artist" class="text-gray-300 text-lg">Primera Stereo</p>
      </div>

      <!-- Play Button -->
      <div class="flex justify-center">
        <button onclick="togglePlay()" id="play-btn"
          class="w-28 h-28 bg-gradient-to-br from-blue-600 via-purple-600 to-violet-600 rounded-full flex items-center justify-center text-6xl shadow-2xl active:scale-95">
          <i class="fas fa-play" id="play-icon"></i>
        </button>
      </div>

      <audio id="audio-player" src="https://primerastereo.stream.laut.fm/primerastereo" crossorigin="anonymous"></audio>
    </div>

    <footer class="text-center text-gray-500 text-xs mt-12">
      © 2010 - 2026 Primera Stereo • Radio Video Online
    </footer>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const audio = document.getElementById('audio-player');
    const mediaContainer = document.getElementById('media-container');
    const songTitle = document.getElementById('song-title');
    const artistEl = document.getElementById('artist');
    const playIcon = document.getElementById('play-icon');

    let isPlaying = false;
    let player = null;
    let lastTitle = "";

    // Inicializar YouTube Player
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-player', {
        height: '100%',
        width: '100%',
        playerVars: { 'autoplay': 0, 'mute': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0 }
      });
    }

    async function updateMetadata() {
      try {
        const res = await fetch('https://api.laut.fm/station/primerastereo/current_song');
        const data = await res.json();

        const title = data.title || "En Vivo";
        const artist = data.artist?.name || "Primera Stereo";

        songTitle.textContent = title;
        artistEl.textContent = artist;

        // Solo actualizar si cambió la canción
        if (title === lastTitle) return;
        lastTitle = title;

        // Reset
        if (player) player.stopVideo();

        // Si es jingle → mostrar logo
        if (artist.toUpperCase().includes("PRIMERA STEREO") || title.toUpperCase().includes("JINGLE")) {
          mediaContainer.innerHTML = `<img src="https://primerastereo.netlify.app/favicon.png" style="width:100%; height:100%; object-fit:contain;">`;
          return;
        }

        // Buscar portada
        let coverUrl = "https://primerastereo.netlify.app/favicon.png";
        try {
          const itunes = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artist + " " + title)}&entity=song&limit=1`);
          const iData = await itunes.json();
          if (iData.results && iData.results.length > 0) {
            coverUrl = iData.results[0].artworkUrl100.replace('100x100', '600x600');
          }
        } catch(e){}

        // === PARTE CLAVE: Tu método que SÍ funciona ===
        const query = encodeURIComponent(artist + " " + title + " official video");
        fetch(`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent('https://www.youtube.com/results?search_query=' + query)}`)
        .then(r => r.text())
        .then(html => {
          const idMatch = html.match(/"videoId":"([^"]+)"/);
          if (idMatch && idMatch[1] && player) {
            player.loadVideoById(idMatch[1]);
            setTimeout(() => {
              mediaContainer.innerHTML = `
                <iframe width="100%" height="100%" 
                        src="https://www.youtube.com/embed/${idMatch[1]}?autoplay=1&mute=1&modestbranding=1&rel=0" 
                        frameborder="0" allowfullscreen></iframe>
              `;
            }, 1200);
          } else {
            mediaContainer.innerHTML = `<img src="${coverUrl}" style="width:100%; height:100%; object-fit:contain;">`;
          }
        })
        .catch(() => {
          mediaContainer.innerHTML = `<img src="${coverUrl}" style="width:100%; height:100%; object-fit:contain;">`;
        });

      } catch (e) {
        console.error(e);
      }
    }

    function togglePlay() {
      if (!isPlaying) {
        audio.play();
        isPlaying = true;
        playIcon.classList.replace('fa-play', 'fa-pause');
        updateMetadata();
      } else {
        audio.pause();
        isPlaying = false;
        playIcon.classList.replace('fa-pause', 'fa-play');
      }
    }

    setInterval(() => {
      if (isPlaying) updateMetadata();
    }, 10000);

    window.onload = () => updateMetadata();
  </script>
</body>
</html>
