<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Primera Stereo 📻 Radio Video Online</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f0a1f, #1a0033);
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      margin: 0;
      overflow: hidden;
    }
    .glass {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    /* Marquesina optimizada */
    .marquee-container {
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
    }
    .marquee-text {
      display: inline-block;
      padding-left: 100%;
      animation: marquee 12s linear infinite;
    }
    @keyframes marquee {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-100%, 0); }
    }
    .media-container {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    iframe {
      position: absolute;
      top: 50%; left: 50%;
      width: 135%; height: 135%;
      transform: translate(-50%, -50%) scale(1.15);
      pointer-events: none;
    }
    #ad-banner { transition: opacity 0.8s ease-in-out; height: 50px; object-fit: contain; width: 100%; }
    
    /* Estilos Menu Lateral */
    #sidebar {
      position: fixed;
      top: 0; left: -250px;
      width: 250px; height: 100%;
      background: rgba(15, 10, 31, 0.95);
      z-index: 50;
      transition: 0.3s;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    #sidebar.active { left: 0; }
  </style>
</head>
<body class="p-2">

  <!-- Botón Menú Lateral (Círculo Rojo) -->
  <button onclick="toggleSidebar()" class="fixed top-4 left-4 z-[60] text-white text-2xl">
    <i class="fas fa-bars"></i>
  </button>

  <!-- Sidebar -->
  <div id="sidebar" class="p-6 pt-16 shadow-2xl">
    <nav class="flex flex-col gap-6 text-white text-lg">
      <a href="#" class="hover:text-blue-400"><i class="fas fa-home mr-3"></i>Inicio</a>
      <a href="https://primerastereo.netlify.app" target="_blank" class="hover:text-blue-400"><i class="fas fa-globe mr-3"></i>Web Oficial</a>
      <a href="https://api.whatsapp.com/send?phone=+5804127097429" target="_blank" class="hover:text-green-400"><i class="fab fa-whatsapp mr-3"></i>Contacto</a>
      <hr class="opacity-20">
      <p class="text-xs text-gray-400">PRIMERA STEREO v2.0</p>
    </nav>
  </div>

  <div class="flex-1 flex flex-col max-w-lg w-full mx-auto justify-between pt-2">
    
    <div class="flex items-center justify-center gap-2 mb-2">
      <img src="https://primerastereo.netlify.app/favicon.png" alt="Logo" class="w-10 h-10 object-contain rounded-lg">
      <div>
        <h1 class="text-xl font-bold tracking-tighter text-white">PRIMERA STEREO</h1>
        <p class="text-blue-400 text-[10px] text-center -mt-1 uppercase tracking-widest">Radio Video Online</p>
      </div>
    </div>

    <div class="glass rounded-2xl p-4 shadow-2xl flex-1 flex flex-col justify-around mb-2">
      <div class="media-container" id="media-container">
        <img src="https://primerastereo.netlify.app/favicon.png" style="width:100%; height:100%; object-fit:contain; padding: 20px;">
      </div>

      <div class="text-center mt-2">
        <p class="uppercase tracking-widest text-emerald-400 text-[9px] font-bold mb-1">● EN VIVO</p>
        <div class="marquee-container">
          <h2 id="song-title" class="marquee-text text-lg font-bold text-white">Primera Stereo</h2>
        </div>
        <p id="artist" class="text-gray-300 text-xs">Cargando señal...</p>
      </div>

      <!-- Botón Play Reducido (Circulo Amarillo) -->
      <div class="flex justify-center mt-2">
        <button onclick="togglePlay()" id="play-btn"
          class="w-14 h-14 bg-gradient-to-br from-blue-600 to-violet-600 rounded-full flex items-center justify-center text-2xl shadow-xl active:scale-90 text-white">
          <i class="fas fa-play" id="play-icon"></i>
        </button>
      </div>
    </div>

    <div class="text-center mb-1">
      <p class="text-[8px] text-blue-400 font-bold tracking-widest mb-1">NUESTROS PATROCINANTES</p>
      <a id="ad-link" href="#" target="_blank" class="block glass rounded-lg p-1 overflow-hidden">
        <img id="ad-banner" src="https://primerastereo.netlify.app/disponible2.jpg">
      </a>
    </div>

    <footer class="text-center text-gray-500 text-[9px] py-1">
      © 2010 - 2026 PRIMERA STEREO<br>RADIO VIDEO ONLINE
    </footer>
  </div>

  <audio id="audio-player" crossorigin="anonymous"></audio>

  <script>
    const audio = document.getElementById('audio-player');
    const mediaContainer = document.getElementById('media-container');
    const songTitle = document.getElementById('song-title');
    const artistEl = document.getElementById('artist');
    const playIcon = document.getElementById('play-icon');
    
    let isPlaying = false;
    let lastTitle = "";
    const streamUrl = "https://primerastereo.stream.laut.fm/primerastereo";

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('active');
    }

    const banners = [
      { img: "https://primerastereo.netlify.app/disponible2.jpg", link: "https://api.whatsapp.com/send?phone=+5804127097429" },
      { img: "https://primerastereo.netlify.app/Alvacom%20Systems.jpg", link: "https://www.facebook.com/AlvacomSystems" },
      { img: "https://primerastereo.netlify.app/KINESIOLOGIA2.gif", link: "https://www.instagram.com/nely_alvarez" },
      { img: "https://primerastereo.netlify.app/En3D%20Venezuela%20Banner.png", link: "http://www.en3d.io" },
      { img: "https://primerastereo.netlify.app/disponible1.jpg", link: "https://api.whatsapp.com/send?phone=+5804127097429" }
    ];
    let bIdx = 0;

    function rotateBanners() {
      const bImg = document.getElementById('ad-banner');
      if(!bImg) return;
      bImg.style.opacity = 0;
      setTimeout(() => {
        bImg.src = banners[bIdx].img;
        document.getElementById('ad-link').href = banners[bIdx].link;
        bImg.style.opacity = 1;
        bIdx = (bIdx + 1) % banners.length;
      }, 800);
    }

    function showLogo() {
      mediaContainer.innerHTML = `<img src="https://primerastereo.netlify.app/favicon.png" style="width:100%; height:100%; object-fit:contain; padding: 20px;">`;
    }

    async function updateMetadata() {
      try {
        const res = await fetch('https://api.laut.fm/station/primerastereo/current_song');
        const data = await res.json();
        const title = data.title || "En Vivo";
        const artist = data.artist?.name || "Primera Stereo";

        if (title === lastTitle) return;
        lastTitle = title;

        // Reset Marquee
        songTitle.classList.remove('marquee-text');
        void songTitle.offsetWidth; // Trigger reflow
        songTitle.textContent = title;
        if(title.length > 20) songTitle.classList.add('marquee-text');
        
        artistEl.textContent = artist;

        const isJingle = artist.toUpperCase().includes("PRIMERA STEREO") || 
                         title.toUpperCase().includes("JINGLE") || 
                         artist.toUpperCase().includes("RADIO");

        if (isJingle) {
          showLogo();
        } else {
          const query = encodeURIComponent(artist + " " + title + " official video");
          // Proxy para buscar el video
          fetch(`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent('https://www.youtube.com/results?search_query=' + query)}`)
          .then(r => r.text())
          .then(html => {
            const match = html.match(/"videoId":"([^"]+)"/);
            if (match && match[1]) {
              // Cargamos el video y si falla (error de copyright/bloqueo), mostramos logo
              mediaContainer.innerHTML = `<iframe id="yt-player" src="https://www.youtube.com/embed/${match[1]}?autoplay=1&mute=1&controls=0&modestbranding=1&showinfo=0&rel=0" frameborder="0" allow="autoplay"></iframe>`;
            } else { showLogo(); }
          }).catch(() => showLogo());
        }
      } catch (e) { showLogo(); }
    }

    function togglePlay() {
      if (audio.paused) {
        if (!audio.src) audio.src = streamUrl;
        audio.play().then(() => {
          isPlaying = true;
          playIcon.classList.replace('fa-play', 'fa-pause');
          updateMetadata();
        });
      } else {
        audio.pause();
        isPlaying = false;
        playIcon.classList.replace('fa-pause', 'fa-play');
      }
    }

    setInterval(() => { if (isPlaying) updateMetadata(); }, 15000);
    setInterval(rotateBanners, 15000);
    window.onload = () => { rotateBanners(); updateMetadata(); };
  </script>
</body>
</html>
