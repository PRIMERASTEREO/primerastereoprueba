<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIMERA STEREO 📻 RADIO VIDEO ONLINE</title>
     <link rel="icon" type="image/ico" href="https://primerastereo.netlify.app/favicon.png" sizes="512x512">
  <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="192x192" />
  <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="32x32" /> 
  <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="16x16" />  
  <link rel="apple-touch-icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-container: rgba(30, 30, 30, 0.85);
            --bg-player: #252525;
            --text-main: #ffffff;
            --text-slogan: #bbbbbb;
            --accent: #00d4ff;
            --border: rgba(255,255,255,0.1);
            --shadow: rgba(0,0,0,0.8);
            --overlay: rgba(0, 0, 0, 0.6);
            --audio-filter: invert(100%) hue-rotate(180deg) brightness(1.4);
        }

        body { user-select: none; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: var(--text-main); background-size: cover; background-position: center; background-attachment: fixed; }
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay); backdrop-filter: blur(25px); z-index: -1; }

        .container { background: var(--bg-container); backdrop-filter: blur(15px); padding: 2.5rem 1.5rem 1.5rem; border-radius: 30px; box-shadow: 0 15px 35px var(--shadow); text-align: center; width: 92%; max-width: 440px; border: 1px solid var(--border); position: relative; margin: 20px 0; }
        
        /* ÁREA DEL VIDEO AMPLIADA */
        .album-art { 
            width: 100%; /* Ocupa todo el ancho disponible del contenedor */
            height: 220px; /* Aumentado de 135px a 220px */
            margin: 0 auto 1.2rem; 
            border-radius: 20px; 
            background: #000; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); 
            overflow: hidden; 
            position: relative;
            border: 1px solid var(--border);
        }
        
        #video-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        #cover-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 10; transition: opacity 0.8s ease; pointer-events: none; }

        .top-actions { position: absolute; top: 15px; width: calc(100% - 30px); display: flex; justify-content: space-between; left: 15px; z-index: 100; }
        .action-btn { cursor: pointer; font-size: 0.9rem; color: var(--accent); background: var(--bg-player); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }

        .show-info { background: #444; color: #fff; padding: 6px 14px; border-radius: 10px; font-size: 0.75rem; font-weight: 900; margin-bottom: 10px; display: inline-block; text-transform: uppercase; }

        .now-playing { margin: 0.5rem 0; width: 100%; overflow: hidden; height: 30px; position: relative; }
        #track-info { position: absolute; white-space: nowrap; font-size: 1.1rem; font-weight: 600; color: var(--accent); animation: marquee-scroll 12s linear infinite; padding-left: 100%; }
        @keyframes marquee-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-200%); } }

        .player-container { background: var(--bg-player); padding: 8px; border-radius: 50px; margin: 0.5rem 0 1rem; border: 1px solid var(--border); }
        audio { width: 100%; filter: var(--audio-filter); height: 32px; }

        .upcoming-section { background: rgba(0, 0, 0, 0.3); border-radius: 15px; padding: 12px; margin-bottom: 1.2rem; border: 1px solid var(--border); text-align: left; }
        .upcoming-title { font-size: 0.7rem; font-weight: 900; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
        .upcoming-item { display: flex; justify-content: space-between; font-size: 0.68rem; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .active-row { color: #fff; background: rgba(0, 212, 255, 0.2); border-radius: 5px; padding-left: 5px; padding-right: 5px; }

        .social-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin: 1.2rem 0 0.8rem; }
        .social-links a { font-size: 1.3rem; color: var(--accent); transition: transform 0.2s; }
        .social-links a:hover { transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-actions">
            <div class="action-group" style="display:flex; gap:8px;">
                <div class="action-btn" onclick="shareApp()"><i class="fas fa-share-alt"></i></div>
                <div class="action-btn" onclick="toggleModal('qrModal')"><i class="fas fa-qrcode"></i></div>
            </div>
            <div class="action-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="theme-icon"></i></div>
        </div>

        <div style="background: #ff0055; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 0.65rem; font-weight: bold; margin-bottom: 12px; display: inline-block; margin-top: 10px;">● EN VIVO</div>
        
        <div class="album-art">
            <div id="video-area"></div>
            <img id="cover-img" src="https://primera-stereo.netlify.app/PSRO5-5.png">
        </div>

        <div class="show-info" id="current-show">CARGANDO BLOQUE...</div>
        <h1 style="color: var(--accent); margin:0; font-size: 1.8rem; letter-spacing: 1px;">PRIMERA STEREO</h1>
        <p style="color: var(--text-slogan); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-top: 2px;">📻 RADIO VIDEO ONLINE</p>

        <div class="now-playing">
            <div id="track-info">Sincronizando señal de video...</div>
        </div>

        <div class="player-container">
            <audio id="radioPlayer" controls autoplay crossorigin="anonymous">
                <source src="https://primerastereo.stream.laut.fm/primerastereo" type="audio/mpeg">
            </audio>
        </div>

        <div class="upcoming-section">
            <div class="upcoming-title">PROGRAMACIÓN DE HOY</div>
            <div id="upcoming-list"></div>
        </div>

        <div class="social-links">
            <a href="https://www.instagram.com/Primera.Stereo/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/PrimeraStereoRadio" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://www.tiktok.com/@primerastereo" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.youtube.com/@primerastereo" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://t.me/PrimeraStereo" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="https://soundcloud.com/primerastereo" target="_blank"><i class="fab fa-soundcloud"></i></a>
            <a href="https://api.whatsapp.com/send?phone=+5804127097429" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
        <div style="font-size: 0.6rem; color: var(--text-slogan); font-weight: bold; letter-spacing: 1px;">© 2026 PRIMERA STEREO | VENEZUELA</div>
    </div>

    <!-- Modales Simples -->
    <div id="qrModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000;" onclick="this.style.display='none'">
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); text-align:center;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://primera-stereo.netlify.app" style="border: 5px solid white; border-radius:15px;">
            <p style="color:white; margin-top:15px; font-weight:bold;">ESCANEA PARA LLEVAR LA RADIO</p>
        </div>
    </div>

    <script>
        const LOGO_RADIO = "https://primera-stereo.netlify.app/PSRO5-5.png";
        let lastTrack = "";

        const schedule = [
            { s: 0, e: 2, n: "BALADAS ROCK" },
            { s: 2, e: 4, n: "BALADAS EN ESPAÑOL POP" },
            { s: 4, e: 7, n: "MÚSICA LLANERA VENEZOLANA" },
            { s: 7, e: 17, n: "MÚSICA VARIADA" },
            { s: 17, e: 18, n: "MERENGUES" },
            { s: 18, e: 19, n: "MÚSICA POP RETRO" },
            { s: 19, e: 20, n: "BALADAS EN ESPAÑOL POP" },
            { s: 20, e: 21, n: "BALADAS VENEZOLANAS POP" },
            { s: 21, e: 22, n: "BALADAS ROCK" },
            { s: 22, e: 24, n: "BALADAS EN ESPAÑOL POP" }
        ];

        async function updateMetadata() {
            try {
                const res = await fetch("https://api.laut.fm/station/primerastereo/current_song");
                const data = await res.json();
                const track = `${data.artist.name} - ${data.title}`;

                if (track !== lastTrack) {
                    lastTrack = track;
                    document.getElementById('track-info').textContent = track;
                    
                    const isJingle = track.toUpperCase().includes("PRIMERA STEREO") || track.toUpperCase().includes("JINGLE");
                    const cover = document.getElementById('cover-img');

                    if (isJingle) {
                        document.getElementById('video-area').innerHTML = "";
                        cover.src = LOGO_RADIO;
                        cover.style.opacity = "1";
                        document.body.style.backgroundImage = `url('${LOGO_RADIO}')`;
                    } else {
                        // Buscar carátula para el fondo y espera del video
                        fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(track)}&limit=1&entity=song`)
                        .then(r => r.json()).then(d => {
                            if (d.results?.[0]) {
                                const img = d.results[0].artworkUrl100.replace('100x100', '800x800');
                                cover.src = img;
                                document.body.style.backgroundImage = `url('${img}')`;
                            }
                        });
                        loadYouTubeVideo(track);
                    }
                    updateScheduleUI();
                }
            } catch (e) { console.error("Error de metadatos"); }
        }

        function loadYouTubeVideo(queryText) {
            const query = encodeURIComponent(queryText + " music video");
            fetch(`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent('https://www.youtube.com/results?search_query=' + query)}`)
            .then(r => r.text()).then(html => {
                const idMatch = html.match(/"videoId":"([^"]+)"/);
                if (idMatch && idMatch[1]) {
                    const videoId = idMatch[1];
                    const container = document.getElementById('video-area');
                    // Parámetros optimizados: mute=1 para asegurar autoplay, modestbranding para limpieza visual
                    container.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&iv_load_policy=3" frameborder="0" allow="autoplay; encrypted-media"></iframe>`;
                    
                    // Ocultar la carátula después de 3 segundos para mostrar el video
                    setTimeout(() => { document.getElementById('cover-img').style.opacity = "0"; }, 3000);
                }
            });
        }

        function updateScheduleUI() {
            const now = new Date(new Date().toLocaleString("en-US", {timeZone: "America/Caracas"}));
            const hour = now.getHours();
            let current = "PRIMERA STEREO";
            let html = "";
            schedule.forEach(item => {
                const active = (hour >= item.s && hour < item.e);
                if (active) current = item.n;
                html += `<div class="upcoming-item ${active ? 'active-row' : ''}">
                            <span>${String(item.s).padStart(2,'0')}:00 - ${String(item.e).padStart(2,'0')}:00</span>
                            <span>${item.n}</span>
                         </div>`;
            });
            document.getElementById('current-show').textContent = current;
            document.getElementById('upcoming-list').innerHTML = html;
        }

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            if(body.style.filter === 'invert(1)') {
                body.style.filter = 'none';
                icon.className = 'fas fa-moon';
            } else {
                body.style.filter = 'invert(1)';
                icon.className = 'fas fa-sun';
            }
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }

        function shareApp() {
            if (navigator.share) {
                navigator.share({title: 'Primera Stereo', text: 'Escucha la mejor Radio Video Online', url: location.href});
            } else {
                alert("Copia el enlace: " + location.href);
            }
        }

        setInterval(updateMetadata, 20000);
        updateMetadata();
    </script>
</body>
</html>
