<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIMERA STEREO 📻 RADIO VIDEO ONLINE</title>
    <link rel="icon" type="image/png" href="https://primerastereo.netlify.app/favicon.png">
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="192x192" />
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="32x32" /> 
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="16x16" />  
    <link rel="apple-touch-icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-container: rgba(30, 30, 30, 0.75);
            --bg-player: #252525;
            --text-main: #ffffff;
            --text-slogan: #bbbbbb;
            --accent: #00d4ff;
            --border: rgba(255,255,255,0.1);
            --shadow: rgba(0,0,0,0.8);
            --overlay: rgba(0, 0, 0, 0.6);
            --audio-filter: invert(100%) hue-rotate(180deg) brightness(1.4);
        }

        [data-theme="light"] {
            --bg-container: rgba(255, 255, 255, 0.85);
            --bg-player: #f0f0f0;
            --text-main: #222222;
            --text-slogan: #555555;
            --accent: #0088cc;
            --border: #dddddd;
            --shadow: rgba(0,0,0,0.1);
            --overlay: rgba(255, 255, 255, 0.4);
            --audio-filter: none;
        }

        body { user-select: none; -webkit-user-select: none; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: var(--text-main); background-size: cover; background-position: center; background-attachment: fixed; transition: background-image 1.2s ease-in-out; }
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay); backdrop-filter: blur(25px); z-index: -1; }

        .container { background: var(--bg-container); backdrop-filter: blur(15px); padding: 2.5rem 1.8rem 1.8rem; border-radius: 30px; box-shadow: 0 15px 35px var(--shadow); text-align: center; width: 90%; max-width: 420px; border: 1px solid var(--border); position: relative; margin: 20px 0; }
        
        .top-actions { position: absolute; top: 15px; width: calc(100% - 30px); display: flex; justify-content: space-between; left: 15px; z-index: 100; }
        .action-btn { cursor: pointer; font-size: 0.9rem; color: var(--accent); background: var(--bg-player); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }

        .album-art { 
            width: 290px; height: 185px; margin: 0 auto 1.2rem; border-radius: 15px; background: #000; 
            box-shadow: 0 12px 25px rgba(0,0,0,0.4); overflow: hidden; position: relative; 
            transform: translate3d(0,0,0); -webkit-transform: translate3d(0,0,0);
        }
        #video-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; background: #000; }
        #cover-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 10; transition: opacity 0.8s ease; pointer-events: none; }

        .show-info { background: #444; color: #fff; padding: 6px 14px; border-radius: 10px; font-size: 0.75rem; font-weight: 900; margin-bottom: 10px; display: inline-block; text-transform: uppercase; }

        .now-playing { margin: 0.5rem 0; width: 100%; overflow: hidden; height: 30px; position: relative; display: flex; align-items: center; }
        #track-info { position: absolute; white-space: nowrap; font-size: 1rem; font-weight: 600; color: var(--text-main); animation: marquee-scroll 12s linear infinite; padding-left: 100%; }
        @keyframes marquee-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .player-container { background: var(--bg-player); padding: 8px; border-radius: 50px; margin: 0.5rem 0 1rem; border: 1px solid var(--border); }
        audio { width: 100%; filter: var(--audio-filter); height: 32px; }

        .upcoming-section { background: rgba(0, 0, 0, 0.2); border-radius: 15px; padding: 12px; margin-bottom: 1.2rem; border: 1px solid var(--border); text-align: left; }
        .upcoming-title { font-size: 0.65rem; font-weight: 900; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
        .upcoming-item { display: flex; justify-content: space-between; font-size: 0.65rem; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .active-row { color: var(--accent); font-weight: bold; }

        .social-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; margin: 1.2rem 0 0.8rem; }
        .social-links a { font-size: 1.2rem; color: var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-actions">
            <div class="action-group" style="display:flex; gap:8px;">
                <div class="action-btn" onclick="shareApp()"><i class="fas fa-share-alt"></i></div>
                <div class="action-btn" onclick="toggleModal('qrModal')"><i class="fas fa-qrcode"></i></div>
            </div>
            <div class="action-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="theme-icon"></i></div>
        </div>

        <div style="background: #ff0055; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 0.65rem; font-weight: bold; margin-bottom: 5px; display: inline-block; margin-top: 0px;">● EN VIVO</div>
        
        <div class="album-art">
            <div id="video-area"></div>
            <img id="cover-img" src="https://primera-stereo.netlify.app/PSRO5-5.png">
        </div>

        <div class="show-info" id="current-show">CARGANDO...</div>
        <h1 style="color: var(--accent); margin:0; font-size: 1.6rem;">PRIMERA STEREO</h1>
        <p style="color: #ffffff; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; margin-bottom: 5px;">📻 RADIO VIDEO ONLINE 📻</p>

        <div class="now-playing">
            <div id="track-info">Sincronizando señal...</div>
        </div>

        <div class="player-container">
            <audio id="radioPlayer" controls autoplay crossorigin="anonymous">
                <source src="https://primerastereo.stream.laut.fm/primerastereo" type="audio/mpeg">
            </audio>
        </div>

        <div class="upcoming-section">
            <div class="upcoming-title"><i class="fas fa-forward"></i> A continuación:</div>
            <div id="upcoming-list"></div>
        </div>

        <div class="social-links">
            <a href="https://www.instagram.com/Primera.Stereo/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/PrimeraStereoRadio" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://www.tiktok.com/@primerastereo" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.youtube.com/@primerastereo" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://t.me/PrimeraStereo" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="https://soundcloud.com/primerastereo" target="_blank"><i class="fab fa-soundcloud"></i></a>
            <a href="https://api.whatsapp.com/send?phone=+5804127097429&text=Hola%20estoy%20escuchando%20la%20radio" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
        <div style="font-size: 0.55rem; color: var(--text-slogan); font-weight: bold;">© 2010 - 2026 PRIMERA STEREO</div>
    </div>

    <script>
        const LOGO_RADIO = "https://primera-stereo.netlify.app/PSRO5-5.png";
        let lastTrack = "";

        const schedule = [
            { s: 0, e: 2, n: "BALADAS ROCK" }, { s: 2, e: 4, n: "BALADAS EN ESPAÑOL POP" },
            { s: 4, e: 7, n: "MÚSICA LLANERA VENEZOLANA" }, { s: 7, e: 17, n: "MÚSICA VARIADA" },
            { s: 17, e: 18, n: "MERENGUES" }, { s: 18, e: 19, n: "MÚSICA POP RETRO" },
            { s: 19, e: 20, n: "BALADAS EN ESPAÑOL POP" }, { s: 20, e: 21, n: "BALADAS VENEZOLANAS POP" },
            { s: 21, e: 22, n: "BALADAS ROCK" }, { s: 22, e: 24, n: "BALADAS EN ESPAÑOL POP" }
        ];

        async function updateMetadata() {
            try {
                const res = await fetch("https://api.laut.fm/station/primerastereo/current_song");
                const data = await res.json();
                const track = `${data.artist.name} - ${data.title}`;

                if (track !== lastTrack) {
                    lastTrack = track;
                    document.getElementById('track-info').textContent = track;
                    const cover = document.getElementById('cover-img');
                    cover.style.opacity = "1";
                    document.getElementById('video-area').innerHTML = "";

                    const isJingle = track.toUpperCase().includes("PRIMERA STEREO") || track.toUpperCase().includes("JINGLE");

                    if (isJingle) {
                        cover.src = LOGO_RADIO;
                        document.body.style.backgroundImage = `url('${LOGO_RADIO}')`;
                    } else {
                        fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(track)}&limit=1&entity=song`)
                        .then(r => r.json()).then(d => {
                            if (d.results?.[0]) {
                                const img = d.results[0].artworkUrl100.replace('100x100', '800x800');
                                cover.src = img;
                                document.body.style.backgroundImage = `url('${img}')`;
                            }
                        });
                        forceVideoLoad(track);
                    }
                    updateScheduleUI();
                }
            } catch (e) {}
        }

        function forceVideoLoad(queryText) {
            const query = encodeURIComponent(queryText + " official music video");
            fetch("https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent('https://www.youtube.com/results?search_query=' + query))
            .then(r => r.text())
            .then(html => {
                const idMatch = html.match(/"videoId":"([^"]+)"/);
                if (idMatch && idMatch[1]) {
                    const videoId = idMatch[1];
                    const container = document.getElementById('video-area');
                    
                    /* --- SOLUCIÓN UMPG & FLUIDEZ --- */
                    // 1. Usamos youtube-nocookie para saltar algunas restricciones de perfil.
                    // 2. widget_referrer y origin simulan que el video se carga desde una fuente confiable.
                    // 3. autoplay=1 y mute=1 son obligatorios para el arranque automático.
                    const embedUrl = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&vq=small&enablejsapi=1&widget_referrer=https://www.youtube.com&origin=https://www.youtube.com`;
                    
                    container.innerHTML = `<iframe width="100%" height="100%" src="${embedUrl}" allow="autoplay; encrypted-media" style="pointer-events:none; border:none;"></iframe>`;
                    
                    // Esperar 6 segundos para asegurar que el video arrancó antes de quitar la carátula
                    setTimeout(() => { 
                        if(container.innerHTML !== "") document.getElementById('cover-img').style.opacity = "0"; 
                    }, 6000);
                }
            });
        }

        function updateScheduleUI() {
            const now = new Date(new Date().toLocaleString("en-US", {timeZone: "America/Caracas"}));
            const hour = now.getHours();
            let current = "PRIMERA STEREO";
            let html = "";
            schedule.forEach(item => {
                const active = (hour >= item.s && hour < item.e);
                if (active) current = item.n;
                html += `<div class="upcoming-item ${active ? 'active-row' : ''}">
                            <span>${String(item.s).padStart(2,'0')}:00 - ${String(item.e).padStart(2,'0')}:00</span>
                            <span>${item.n}</span>
                         </div>`;
            });
            document.getElementById('current-show').textContent = current;
            document.getElementById('upcoming-list').innerHTML = html;
        }

        function toggleTheme() {
            const isL = document.body.getAttribute('data-theme') === 'light';
            document.body.setAttribute('data-theme', isL ? 'dark' : 'light');
            document.getElementById('theme-icon').className = isL ? 'fas fa-moon' : 'fas fa-sun';
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }

        function shareApp() {
            if (navigator.share) navigator.share({title: 'Primera Stereo', url: location.href});
        }

        setInterval(updateMetadata, 15000);
        updateMetadata();
    </script>
</body>
</html>
